<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital Wallonia - Aktörler</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      color: #1a1a2e;
    }

    header {
      background: #1a3a6b;
      color: white;
      padding: 20px 32px;
      display: flex;
      align-items: center;
      gap: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    header h1 { font-size: 1.4rem; font-weight: 600; }
    header span { font-size: 0.9rem; opacity: 0.7; }

    .stats-bar {
      background: #e8f0fe;
      padding: 10px 32px;
      display: flex;
      gap: 24px;
      font-size: 0.85rem;
      color: #3c5a8a;
      border-bottom: 1px solid #c5d5f0;
    }

    .stats-bar span strong { color: #1a3a6b; }

    .controls {
      padding: 20px 32px;
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .search-box {
      flex: 1;
      min-width: 240px;
      max-width: 500px;
      position: relative;
    }

    .search-box input {
      width: 100%;
      padding: 10px 16px 10px 40px;
      border: 1px solid #c5d5f0;
      border-radius: 8px;
      font-size: 0.95rem;
      background: white;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-box input:focus { border-color: #1a3a6b; }

    .search-box::before {
      content: '🔍';
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.9rem;
    }

    .result-count {
      font-size: 0.9rem;
      color: #666;
      margin-left: auto;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
      padding: 0 32px 32px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      border: 1px solid #e4eaf5;
      transition: box-shadow 0.2s, transform 0.2s;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .card:hover {
      box-shadow: 0 4px 16px rgba(26,58,107,0.12);
      transform: translateY(-2px);
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-wrap {
      width: 52px;
      height: 52px;
      border-radius: 8px;
      overflow: hidden;
      background: #f0f4f8;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .logo-placeholder {
      font-size: 1.4rem;
      color: #9ab0cc;
    }

    .card-name {
      font-size: 1rem;
      font-weight: 600;
      color: #1a3a6b;
      line-height: 1.3;
    }

    .card-desc {
      font-size: 0.85rem;
      color: #555;
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-meta {
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: 0.8rem;
      color: #777;
      margin-top: auto;
    }

    .card-meta a {
      color: #2563eb;
      text-decoration: none;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-meta a:hover { text-decoration: underline; }

    .card-actions {
      display: flex;
      gap: 8px;
      margin-top: 6px;
    }

    .btn {
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 0.8rem;
      text-decoration: none;
      font-weight: 500;
      transition: background 0.2s;
    }

    .btn-primary {
      background: #1a3a6b;
      color: white;
    }

    .btn-primary:hover { background: #142d55; }

    .btn-secondary {
      background: #e8f0fe;
      color: #1a3a6b;
    }

    .btn-secondary:hover { background: #d0e0fb; }

    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      padding: 20px 32px;
    }

    .pagination button {
      padding: 8px 16px;
      border: 1px solid #c5d5f0;
      border-radius: 6px;
      background: white;
      cursor: pointer;
      font-size: 0.9rem;
      color: #1a3a6b;
      transition: background 0.15s;
    }

    .pagination button:hover:not(:disabled) { background: #e8f0fe; }
    .pagination button:disabled { opacity: 0.4; cursor: default; }
    .pagination button.active { background: #1a3a6b; color: white; border-color: #1a3a6b; }

    .pagination span { font-size: 0.9rem; color: #666; }

    .loading {
      text-align: center;
      padding: 60px;
      font-size: 1rem;
      color: #666;
    }

    .no-data {
      text-align: center;
      padding: 60px;
      font-size: 1rem;
      color: #999;
    }

    .scrape-banner {
      background: #fff3cd;
      border: 1px solid #ffc107;
      border-radius: 8px;
      margin: 0 32px 20px;
      padding: 14px 18px;
      font-size: 0.9rem;
      color: #856404;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .scrape-banner button {
      margin-left: auto;
      padding: 6px 14px;
      background: #1a3a6b;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>

<header>
  <div>
    <h1>Digital Wallonia — Aktörler Rehberi</h1>
    <span>digitalwallonia.be/fr/cartographie</span>
  </div>
</header>

<div class="stats-bar" id="stats-bar">
  Yükleniyor...
</div>

<div class="controls">
  <div class="search-box">
    <input type="text" id="search" placeholder="Şirket adı, açıklama veya adres ile ara..." oninput="onSearch()">
  </div>
  <div class="result-count" id="result-count"></div>
</div>

<div id="scrape-notice" style="display:none" class="scrape-banner">
  ⚠️ Veri bulunamadı. Önce scraper'ı çalıştırın:
  <code>python scraper.py</code>
</div>

<div id="grid" class="grid"></div>
<div id="pagination" class="pagination"></div>

<script>
  let currentPage = 1;
  let searchTimeout = null;
  const PER_PAGE = 20;

  async function loadStats() {
    const r = await fetch('/api/stats');
    const d = await r.json();
    document.getElementById('stats-bar').innerHTML = `
      <span>Toplam: <strong>${d.total.toLocaleString()}</strong> aktör</span>
      <span>Web siteli: <strong>${d.with_website.toLocaleString()}</strong></span>
      <span>Adresli: <strong>${d.with_address.toLocaleString()}</strong></span>
      <span>Logolu: <strong>${d.with_logo.toLocaleString()}</strong></span>
    `;
    if (d.total === 0) {
      document.getElementById('scrape-notice').style.display = 'flex';
    }
  }

  async function loadCompanies(page = 1) {
    const q = document.getElementById('search').value;
    const url = `/api/companies?page=${page}&per_page=${PER_PAGE}&q=${encodeURIComponent(q)}`;

    document.getElementById('grid').innerHTML = '<div class="loading">Yükleniyor...</div>';

    const r = await fetch(url);
    const d = await r.json();

    currentPage = page;
    renderGrid(d.companies);
    renderPagination(d.page, d.total_pages, d.total);

    document.getElementById('result-count').textContent =
      `${d.total.toLocaleString()} sonuç`;
  }

  function renderGrid(companies) {
    const grid = document.getElementById('grid');
    if (!companies.length) {
      grid.innerHTML = '<div class="no-data">Sonuç bulunamadı.</div>';
      return;
    }

    grid.innerHTML = companies.map(c => `
      <div class="card">
        <div class="card-header">
          <div class="logo-wrap">
            ${c.logo
              ? `<img src="${c.logo}" alt="${escHtml(c.name)}" onerror="this.parentElement.innerHTML='<span class=logo-placeholder>🏢</span>'">`
              : '<span class="logo-placeholder">🏢</span>'}
          </div>
          <div class="card-name">${escHtml(c.name) || '<em>İsimsiz</em>'}</div>
        </div>
        ${c.description ? `<div class="card-desc">${escHtml(c.description)}</div>` : ''}
        <div class="card-meta">
          ${c.address ? `<span>📍 ${escHtml(c.address)}</span>` : ''}
          ${c.website ? `<span>🌐 <a href="${c.website}" target="_blank" rel="noopener">${c.website}</a></span>` : ''}
        </div>
        <div class="card-actions">
          ${c.profile_url ? `<a href="${c.profile_url}" target="_blank" class="btn btn-primary">Profil</a>` : ''}
          ${c.website ? `<a href="${c.website}" target="_blank" class="btn btn-secondary">Web Sitesi</a>` : ''}
        </div>
      </div>
    `).join('');
  }

  function renderPagination(page, totalPages, total) {
    const pag = document.getElementById('pagination');
    if (totalPages <= 1) { pag.innerHTML = ''; return; }

    let html = `<button onclick="loadCompanies(${page - 1})" ${page <= 1 ? 'disabled' : ''}>← Önceki</button>`;

    const start = Math.max(1, page - 2);
    const end = Math.min(totalPages, page + 2);

    if (start > 1) html += `<button onclick="loadCompanies(1)">1</button><span>…</span>`;
    for (let i = start; i <= end; i++) {
      html += `<button onclick="loadCompanies(${i})" class="${i === page ? 'active' : ''}">${i}</button>`;
    }
    if (end < totalPages) html += `<span>…</span><button onclick="loadCompanies(${totalPages})">${totalPages}</button>`;

    html += `<button onclick="loadCompanies(${page + 1})" ${page >= totalPages ? 'disabled' : ''}>Sonraki →</button>`;
    html += `<span>${total.toLocaleString()} sonuç</span>`;
    pag.innerHTML = html;
  }

  function onSearch() {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => loadCompanies(1), 350);
  }

  function escHtml(str) {
    return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  loadStats();
  loadCompanies(1);
</script>
</body>
</html>
